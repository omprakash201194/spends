server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/javascript application/xml image/svg+xml;
    gzip_min_length 1000;

    # Vite writes content-hashed filenames under /assets/ — safe to cache forever.
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    # index.html must never be cached: it references the new hashed assets on each deploy.
    location = /index.html {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma "no-cache";
        expires 0;
    }

    # Proxy API calls to the backend service (k8s internal DNS).
    location /api/ {
        proxy_pass http://spends-backend:8080/api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
        # Increase body size limit for XLS uploads (also set in Ingress annotation)
        client_max_body_size 50m;
    }

    # SPA fallback — all non-asset, non-API routes serve index.html.
    location / {
        try_files $uri $uri/ /index.html;
    }
}
